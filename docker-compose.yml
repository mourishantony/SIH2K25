# Docker Compose v2 ignores the version field; removed for clarity.

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: sih_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: patient_contact_tracing
    networks:
      - sih_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sih_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data/video_uploads:/app/data/video_uploads
      - ./src:/app/src
      - ./backend:/app/backend
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: patient_contact_tracing
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      BACKEND_DEBUG: "true"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      ADMIN_EMAIL: admin@hospital.com
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - sih_network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sih_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sih_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  sih_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
